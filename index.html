<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sri Srinivasa Water Supply</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@100;300;600;800&family=Noto+Sans+Kannada:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --royal-blue: #001529;
            --deep-navy: #000c17;
            --gold: #D4AF37;
            --dark-gold: #B8860B;
            --silver: #bdc3c7;
            --cabin-red: #b22222;
            --premium-green: #2ecc71; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(180deg, var(--royal-blue) 0%, var(--deep-navy) 100%);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .header {
            padding: 50px 20px 10px;
            text-align: center;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 2.1rem;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
            font-weight: 900;
            font-style: italic;
        }

        .header h2 {
            font-family: 'Noto Sans Kannada', sans-serif;
            color: var(--gold);
            font-size: 1.4rem;
            font-weight: 400;
            opacity: 0.8;
        }

        /* Animation Section */
        .animation-box {
            position: relative;
            height: 140px;
            margin: 30px 0;
            width: 100%;
            display: flex;
            align-items: center;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
        }

        .hidden-text {
            position: absolute;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 4px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem; /* Adjusted for elegant thin look */
            font-weight: 100; /* Matching Premium Water Supply style */
            letter-spacing: 6px; /* Spaced out for premium feel */
            color: rgba(255, 255, 255, 0.05);
            z-index: 1;
            text-transform: uppercase;
        }

        .letter {
            opacity: 0;
            transition: opacity 0.1s, color 0.3s;
        }

        .truck-container {
            position: absolute;
            left: -180px;
            z-index: 5;
            animation: truckMove 6s linear infinite;
        }

        @keyframes truckMove {
            0% { left: -180px; }
            100% { left: 110%; }
        }

        .truck-svg {
            width: 160px;
            height: auto;
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.6));
        }

        /* Content Section */
        .content {
            flex: 1;
            padding: 20px 25px;
            text-align: center;
        }

        .owner-name {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 1.9rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 15px;
            display: block;
        }

        .contact-list {
            list-style: none;
            margin-bottom: 35px;
        }

        .contact-list li {
            font-size: 1.6rem;
            margin: 12px 0;
            color: #f0f0f0;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* Call Button */
        .call-action-btn {
            background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%);
            color: var(--deep-navy);
            border: none;
            width: 100%;
            max-width: 340px;
            padding: 18px 20px;
            border-radius: 15px;
            display: grid;
            grid-template-columns: 40px 1fr;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            margin: 0 auto;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .call-action-btn:hover, .call-action-btn:active {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.4);
        }

        .call-action-btn i {
            width: 32px; 
            height: 32px;
            stroke: var(--premium-green);
            stroke-width: 2.5;
            justify-self: center;
        }

        .btn-text-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }

        .btn-en { 
            font-size: 1.4rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            line-height: 1.1;
            margin-bottom: 2px;
        }
        
        .btn-kn { 
            font-family: 'Noto Sans Kannada', sans-serif; 
            font-size: 1.05rem; 
            font-weight: 700;
            opacity: 1;
            line-height: 1.2;
        }

        .extra-scroll {
            margin-top: 100px;
            font-size: 1.8rem;
            font-weight: 100; /* Ultra thin */
            color: var(--gold);
            letter-spacing: 8px;
            opacity: 0.3;
            padding-bottom: 80px;
            text-transform: uppercase;
        }

        .footer {
            padding: 40px 20px;
            background: rgba(0,0,0,0.6);
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            text-align: center;
        }

        .footer p {
            margin: 8px 0;
            font-size: 1rem;
            opacity: 0.8;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <section class="header">
        <h1>Sri Srinivasa Water Supply</h1>
        <h2>ಶ್ರೀ ಶ್ರೀನಿವಾಸ ವಾಟರ್ ಸಪ್ಲೈ</h2>
    </section>

    <div class="animation-box">
        <div class="hidden-text" id="revealText">
            <span class="letter">B</span><span class="letter">E</span><span class="letter">S</span><span class="letter">T</span>
            <span class="letter">&nbsp;</span>
            <span class="letter">W</span><span class="letter">A</span><span class="letter">T</span><span class="letter">E</span><span class="letter">R</span>
            <span class="letter">&nbsp;</span>
            <span class="letter">S</span><span class="letter">U</span><span class="letter">P</span><span class="letter">P</span><span class="letter">L</span><span class="letter">Y</span>
        </div>
        
        <div class="truck-container" id="truck">
            <svg class="truck-svg" viewBox="0 0 180 80">
                <path d="M140 25 L165 25 L175 55 L140 55 Z" fill="var(--cabin-red)" /> 
                <rect x="145" y="30" width="18" height="12" fill="#87CEEB" rx="1" />
                <rect x="10" y="15" width="125" height="40" rx="20" fill="var(--silver)" />
                <rect x="10" y="30" width="125" height="10" fill="rgba(0,0,0,0.1)" />
                <rect x="5" y="55" width="170" height="7" fill="#222" rx="2" />
                <circle cx="30" cy="65" r="9" fill="#111" stroke="#444" stroke-width="2"/>
                <circle cx="55" cy="65" r="9" fill="#111" stroke="#444" stroke-width="2"/>
                <circle cx="145" cy="65" r="9" fill="#111" stroke="#444" stroke-width="2"/>
            </svg>
        </div>
    </div>

    <main class="content">
        <strong class="owner-name">T. Murali</strong>
        
        <ul class="contact-list">
            <li>9449693018</li>
            <li>9108055175</li>
            <li>9480893018</li>
        </ul>

        <a href="#" class="call-action-btn" onclick="dialRandom(); return false;">
            <i data-lucide="phone"></i>
            <div class="btn-text-wrapper">
                <span class="btn-en">Call Owner</span>
                <span class="btn-kn">ಸರಬರಾಜುದಾರರಿಗೆ ಕರೆಮಾಡಿ</span>
            </div>
        </a>

        <div class="extra-scroll">PREMIUM WATER SUPPLY</div>
    </main>

    <footer class="footer">
        <p>ನೀರು ಬೇಕೆ? ಈ ಲಿಂಕ್ ಅನ್ನು ಇತರರಿಗೂ ಹಂಚಿಕೊಳ್ಳಿ</p>
        <p>Need water? Share this link to others as well</p>
    </footer>

    <script>
        lucide.createIcons();

        const truck = document.getElementById('truck');
        const letters = document.querySelectorAll('.letter');

        function animateLetters() {
            const truckRect = truck.getBoundingClientRect();
            const truckFront = truckRect.right;

            letters.forEach((letter) => {
                const letterRect = letter.getBoundingClientRect();
                if (truckFront > letterRect.left + 5) {
                    letter.style.opacity = "1";
                    letter.style.color = "var(--gold)"; 
                }
            });

            if (truckRect.left < -170) {
                letters.forEach(l => {
                    l.style.opacity = "0";
                    l.style.color = "rgba(255, 255, 255, 0.05)";
                });
            }
            requestAnimationFrame(animateLetters);
        }

        animateLetters();

        function dialRandom() {
            const nums = ["9449693018", "9108055175"];
            const choice = nums[Math.floor(Math.random() * nums.length)];
            window.location.href = "tel:" + choice;
        }
    </script>
</body>
</html>
